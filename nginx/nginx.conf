# ============================================================
# NGINX CONFIGURATION — LEVAV TALENT AFRIKA SPA
# ============================================================
# Purpose: Routes all non-file requests to index.html for
#          React Router SPA client-side routing.
# 
# PLACEMENT INSTRUCTIONS:
#   Option A — Docker Deployment:
#     1. Copy this file to your project root as 'nginx.conf'
#     2. In your Dockerfile, add:
#        COPY nginx.conf /etc/nginx/conf.d/default.conf
#     3. Ensure your build output (dist/public) is copied to:
#        /usr/share/nginx/html
#
#   Option B — Bare Metal / VPS:
#     1. Place this file at: /etc/nginx/sites-available/levav
#     2. Symlink it: 
#        sudo ln -s /etc/nginx/sites-available/levav /etc/nginx/sites-enabled/
#     3. Set your build output directory in 'root' below
#     4. Test: sudo nginx -t
#     5. Reload: sudo systemctl reload nginx
#
#   Option C — Kubernetes (ConfigMap):
#     1. Create a ConfigMap from this file:
#        kubectl create configmap levav-nginx --from-file=nginx.conf
#     2. Mount it in your nginx container at /etc/nginx/conf.d/default.conf
#
#   Option D — Platform-as-a-Service (Render, Railway, etc.):
#     1. Some PaaS platforms let you include an 'nginx.conf' in repo root
#     2. Check your platform's documentation for nginx override paths
#
# ============================================================

server {
    # Listen on standard HTTP port
    listen 80;
    # listen [::]:80;

    # Server name (update for production domain)
    server_name localhost;
    # server_name levav.af www.levav.af;

    # ─── ROOT: Path to your built static files ───
    # This must point to the directory containing index.html
    # After 'npm run build', this is typically:
    #   - Local:  /var/www/levav/dist/public
    #   - Docker: /usr/share/nginx/html
    #   - VPS:    /var/www/levav/html
    root /usr/share/nginx/html;

    # ─── INDEX FILES ───
    index index.html index.htm;

    # ─── SECURITY HEADERS ───
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── GZIP COMPRESSION ───
    # Critical for Zambian mobile networks — reduces payload by ~70%
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml
        font/woff2;

    # ═══════════════════════════════════════════════════════════
    # CORE SPA ROUTING FIX — try_files directive
    # ═══════════════════════════════════════════════════════════
    # This is the critical configuration that resolves the 404.
    # NGINX tries the URI as a file, then as a directory.
    # If neither exists, it serves /index.html — letting React
    # Router handle the client-side route (/talent, /employer, etc.)
    # ═══════════════════════════════════════════════════════════
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── STATIC ASSETS — Aggressive Caching ───
    # JS/CSS bundles with content hash: cache forever (immutable)
    location ~* \.(js|css)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # ─── WEBP IMAGES — Long-term Caching ───
    # Mobile-first visual layers — must load instantly on 3G/4G
    location ~* \.(webp|png|jpg|jpeg|gif|ico)$ {
        expires 6M;
        add_header Cache-Control "public, max-age=15552000";
        access_log off;
    }

    # ─── MEDIA STREAMS & ASSETS ───
    location ~* \.(mp4|webm|ogg|mp3|wav|m4a)$ {
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
        add_header Accept-Ranges bytes;
        access_log off;
    }

    # ─── FONTS — Permanent Cache ───
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable, max-age=31536000";
        access_log off;
    }

    # ─── SVG ICONS ───
    location ~* \.svg$ {
        expires 1M;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    # ─── NO CACHING FOR HTML (SPA root) ───
    # index.html must never be cached so SPA updates propagate
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
    }

    # ─── DISALLOW HIDDEN FILES ───
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── HEALTH CHECK ENDPOINT ───
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

